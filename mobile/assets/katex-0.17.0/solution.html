<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- KaTeX for rendering LaTeX formulas locally -->
  <link rel="stylesheet" href="katex.min.css">
  <script defer src="katex.min.js"></script>
  <script defer src="contrib/auto-render.min.js"></script>
</head>
<body>
  <div id="app-content"></div>

  <script>
    function updateContent(data) {
      if (data.isDarkMode) {
        document.documentElement.className = "dark";
      } else {
        document.documentElement.className = "";
      }
      
      // Inject the dynamic HTML layout string generated by Dart
      document.getElementById('app-content').innerHTML = data.html;

      // Re-trigger KaTeX auto-renderer on the injected content
      if (window.renderMathInElement) {
        renderMathInElement(document.body, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
          ],
          throwOnError: false
        });
      }
    }
  </script>
</body>
</html>
